name: release

# Publica el .exe a GitHub Releases al pushear un tag vX.Y.Z (spec §9).
# El bucket R2 NUNCA aloja el exe; sólo GitHub Releases.
# Si SignPath está configurado (secret presente), el exe se firma; si no, sale sin firma.

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build single-exe (Release)
        run: dotnet build src/L5ArgentinaLauncher.csproj -c Release --nologo

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item src/bin/Release/net48/L5ArgentinaLauncher.exe dist/

      # ───────── Firma con SignPath (solo si el secret está cargado) ─────────
      # Hasta configurar SignPath, estos pasos se saltan y el release sale sin firma.
      - name: Upload unsigned artifact (para SignPath)
        if: env.SIGNPATH_API_TOKEN != ''
        id: unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-exe
          path: dist/L5ArgentinaLauncher.exe

      - name: Sign with SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          # TODO(SignPath): ajustar estos slugs a los que crees en tu proyecto de SignPath.
          project-slug: l5argentina-launcher
          signing-policy-slug: release-signing
          artifact-configuration-slug: exe
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          # El artefacto firmado reemplaza al de dist/ antes de calcular el hash y publicar.
          output-artifact-directory: dist

      - name: Compute SHA-256 (segundo canal de integridad)
        shell: pwsh
        run: |
          $h = (Get-FileHash dist/L5ArgentinaLauncher.exe -Algorithm SHA256).Hash.ToLower()
          $h | Out-File -Encoding ascii -NoNewline dist/L5ArgentinaLauncher.exe.sha256.txt
          Write-Host "SHA-256: $h"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/L5ArgentinaLauncher.exe
            dist/L5ArgentinaLauncher.exe.sha256.txt
          generate_release_notes: true
